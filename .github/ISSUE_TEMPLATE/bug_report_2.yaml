name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug"]
projects: []
assignees:
  - Erallie
type: bug
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      options:
        - label: I have searched existing issues and bugs and have not found the same bug I experienced.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      value: "A bug happened!"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
          1. Go to '...'
          2. Click on '...'
          3. Scroll down to '...'
          4. See error
      value: ""
    validations:
      required: true
  - type: Expected behavior
    id: expected
    attributes:
      label: Contact Details
      description: A clear and concise description of what you expected to happen.
      placeholder: ex. email@example.com
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      value: ""
    validations:
      required: true
  - type: upload
    id: screenshots
    attributes:
      label: Upload screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
      value: ""
    validations:
      required: false
